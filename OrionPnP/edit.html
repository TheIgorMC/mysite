<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>OrionPnP CMS</title>
  <style>
    :root {
      --navy:#060d1a; --surface:rgba(11,22,41,0.95); --surface2:rgba(6,13,26,0.7);
      --border:rgba(255,255,255,0.09); --border-hi:rgba(255,255,255,0.18);
      --accent:#e07c24; --accent2:#63b3ed; --text:#e8f1ff; --muted:#7da4c8;
      --success:#4ade80; --danger:#f87171; --radius:10px;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--navy);color:var(--text);font-family:system-ui,sans-serif;font-size:.93rem;min-height:100vh;}
    /* ── header ── */
    .hdr{background:rgba(6,13,26,.97);border-bottom:1px solid var(--border);padding:.7rem 1.5rem;position:sticky;top:0;z-index:100;}
    .hdr-inner{max-width:980px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;}
    .hdr-logo{font-weight:700;font-size:1rem;letter-spacing:-.02em;}
    .badge{background:var(--accent);color:#fff;font-size:.62rem;padding:.1rem .4rem;border-radius:4px;vertical-align:middle;margin-left:.35rem;font-weight:700;letter-spacing:.06em;}
    .hdr-right{display:flex;align-items:center;gap:.9rem;}
    .save-status{font-size:.82rem;transition:color .3s;}
    .save-status.ok{color:var(--success);}
    .save-status.err{color:var(--danger);}
    .btn-sm:disabled{opacity:.38;cursor:not-allowed;}
    .locked .tabs,.locked .main{filter:blur(1px);pointer-events:none;user-select:none;}
    .auth-overlay{position:fixed;inset:0;z-index:1000;display:none;align-items:center;justify-content:center;padding:1.5rem;background:rgba(3,8,18,.84);backdrop-filter:blur(12px);}
    .auth-overlay.show{display:flex;}
    .auth-card{width:min(460px,100%);background:var(--surface);border:1px solid var(--border-hi);border-radius:18px;padding:1.35rem;box-shadow:0 24px 80px rgba(0,0,0,.45);}
    .auth-card h2{font-size:1.05rem;margin-bottom:.35rem;}
    .auth-card p{color:var(--muted);line-height:1.5;margin-bottom:1rem;}
    .auth-form{display:grid;gap:.75rem;}
    .auth-form label{display:flex;flex-direction:column;gap:.35rem;font-size:.72rem;color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:.05em;}
    .auth-form input{background:rgba(6,13,26,.85);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:inherit;font-size:.95rem;padding:.62rem .8rem;width:100%;transition:border-color .15s;}
    .auth-form input:focus{outline:none;border-color:var(--accent2);}
    .auth-actions{display:flex;justify-content:flex-end;gap:.6rem;align-items:center;flex-wrap:wrap;}
    .auth-note{font-size:.82rem;color:var(--muted);min-height:1.2em;}
    /* ── buttons ── */
    .btn{border:none;border-radius:var(--radius);cursor:pointer;font-size:.88rem;font-weight:600;padding:.5rem 1.2rem;transition:opacity .15s;}
    .btn-primary{background:var(--accent);color:#fff;}
    .btn-primary:hover{opacity:.85;}
    .btn-primary:disabled{opacity:.45;cursor:default;}
    .btn-sm{background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--muted);padding:.22rem .6rem;font-size:.76rem;cursor:pointer;transition:border-color .15s,color .15s;}
    .btn-sm:hover{border-color:var(--border-hi);color:var(--text);}
    .btn-del{border-color:rgba(248,113,113,.25);color:var(--danger);}
    .btn-del:hover{border-color:var(--danger)!important;color:var(--danger);}
    .btn-add{background:rgba(99,179,237,.07);border:1px dashed rgba(99,179,237,.35);border-radius:var(--radius);color:var(--accent2);width:100%;padding:.6rem;text-align:center;cursor:pointer;font-size:.86rem;transition:background .15s,border-color .15s;}
    .btn-add:hover{background:rgba(99,179,237,.13);border-color:var(--accent2);}
    /* ── tabs ── */
    .tabs{max-width:980px;margin:0 auto;padding:1.2rem 1.5rem 0;display:flex;gap:.35rem;flex-wrap:wrap;}
    .tab{background:transparent;border:1px solid var(--border);border-bottom:none;border-radius:var(--radius) var(--radius) 0 0;color:var(--muted);padding:.45rem 1rem;cursor:pointer;font-size:.86rem;transition:color .15s,background .15s;}
    .tab.active{background:var(--surface);color:var(--text);border-color:var(--border-hi);}
    .tab:hover:not(.active){color:var(--text);}
    /* ── main ── */
    .main{max-width:980px;margin:0 auto;padding:0 1.5rem 4rem;}
    .panel{background:var(--surface);border:1px solid var(--border-hi);border-radius:0 var(--radius) var(--radius) var(--radius);padding:1.4rem;}
    .panel-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.1rem;}
    .panel-header h2{font-size:.95rem;font-weight:600;}
    .panel-header .cnt{font-size:.76rem;color:var(--muted);}
    /* ── item cards ── */
    .items{display:flex;flex-direction:column;gap:.6rem;margin-bottom:.6rem;}
    .card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
    .card-hdr{display:flex;align-items:center;gap:.7rem;padding:.65rem 1rem;cursor:pointer;user-select:none;}
    .card-hdr:hover{background:rgba(255,255,255,.025);}
    .chevron{font-size:.6rem;color:var(--muted);flex-shrink:0;transition:transform .15s;display:inline-block;}
    .card.open .chevron{transform:rotate(90deg);}
    .card-summary{flex:1;font-size:.86rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .card-meta{font-size:.73rem;color:var(--muted);flex-shrink:0;}
    .card-body{display:none;padding:1rem;border-top:1px solid var(--border);}
    .card.open .card-body{display:block;}
    /* ── fields ── */
    .fgrid{display:grid;grid-template-columns:1fr 1fr;gap:.55rem .75rem;margin-bottom:.55rem;}
    .fgrid.full{grid-template-columns:1fr;}
    .fgrid.tri{grid-template-columns:1fr 1fr 1fr;}
    .field{display:flex;flex-direction:column;gap:.28rem;}
    .field label{font-size:.72rem;color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:.05em;}
    .field input,.field textarea,.field select{
      background:rgba(6,13,26,.85);border:1px solid var(--border);border-radius:8px;
      color:var(--text);font-family:inherit;font-size:.88rem;padding:.42rem .7rem;width:100%;
      transition:border-color .15s;
    }
    .field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:var(--accent2);}
    .field textarea{resize:vertical;min-height:72px;line-height:1.5;}
    .field input[type=number]{-moz-appearance:textfield;}
    /* ── lang toggle ── */
    .lang-hdr{margin-top:.6rem;}
    .lang-btn{background:none;border:none;color:var(--accent2);font-size:.75rem;cursor:pointer;padding:0;display:flex;align-items:center;gap:.3rem;}
    .lang-btn:hover{text-decoration:underline;}
    .lang-fields{display:none;margin-top:.5rem;}
    .lang-fields.open{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.5rem;}
    /* ── card footer ── */
    .card-foot{display:flex;justify-content:space-between;align-items:center;padding-top:.7rem;border-top:1px solid var(--border);margin-top:.7rem;}
    .card-order{display:flex;gap:.35rem;}
    /* ── misc ── */
    .empty{color:var(--muted);text-align:center;padding:1.5rem;font-size:.9rem;}
    .loading{color:var(--muted);text-align:center;padding:3rem;}

    /* locales tab */
    .locale-toolbar{display:flex;align-items:center;gap:.7rem;flex-wrap:wrap;margin-bottom:1rem;}
    .locale-toolbar label{font-size:.78rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;}
    .locale-toolbar select{
      background:rgba(6,13,26,.85);border:1px solid var(--border);border-radius:8px;
      color:var(--text);font-family:inherit;font-size:.88rem;padding:.36rem .62rem;
    }
    .locale-grid{display:grid;grid-template-columns:1fr;gap:.55rem;}
    .locale-row{display:grid;grid-template-columns:minmax(180px, 260px) 1fr;gap:.65rem;align-items:start;}
    .locale-key{font-size:.78rem;color:var(--muted);padding-top:.45rem;word-break:break-word;}
    .locale-values{display:grid;grid-template-columns:1fr 1fr;gap:.65rem;}
    .locale-col{display:flex;flex-direction:column;gap:.3rem;}
    .locale-col label{font-size:.72rem;color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:.05em;}
    .locale-row textarea{
      background:rgba(6,13,26,.85);border:1px solid var(--border);border-radius:8px;
      color:var(--text);font-family:inherit;font-size:.88rem;padding:.45rem .65rem;min-height:56px;resize:vertical;
    }
    .locale-row textarea.ref{opacity:.8;}

    /* gallery tab */
    .asset-browser{margin-bottom:1.4rem;}
    .asset-browser-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:.7rem;}
    .asset-browser-hdr h3{font-size:.9rem;font-weight:600;}
    .asset-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:.6rem;}
    .asset-tile{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;display:flex;flex-direction:column;}
    .asset-tile img{width:100%;aspect-ratio:1;object-fit:cover;background:#0b1629;display:block;}
    .asset-tile-foot{padding:.4rem .5rem;display:flex;flex-direction:column;gap:.3rem;}
    .asset-tile-name{font-size:.68rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .asset-tile-btns{display:flex;gap:.3rem;}
    .btn-add-gallery{background:rgba(224,124,36,.1);border:1px solid rgba(224,124,36,.35);border-radius:5px;color:var(--accent);font-size:.7rem;padding:.18rem .45rem;cursor:pointer;white-space:nowrap;}
    .btn-add-gallery:hover{background:rgba(224,124,36,.2);}
    .upload-zone{border:2px dashed var(--border);border-radius:var(--radius);padding:1.2rem;text-align:center;color:var(--muted);font-size:.86rem;cursor:pointer;transition:border-color .15s,color .15s;margin-bottom:.7rem;}
    .upload-zone:hover,.upload-zone.drag{border-color:var(--accent2);color:var(--text);}
    .gallery-items-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:.7rem;}
    .gallery-items-hdr h3{font-size:.9rem;font-weight:600;}
    .gallery-item-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);display:grid;grid-template-columns:80px 1fr auto;gap:.8rem;align-items:start;padding:.7rem;margin-bottom:.5rem;}
    .gallery-item-thumb{width:80px;height:60px;object-fit:cover;border-radius:6px;background:#0b1629;display:block;}
    .gallery-item-fields{display:flex;flex-direction:column;gap:.45rem;}
    .gallery-item-actions{display:flex;flex-direction:column;gap:.3rem;align-items:flex-end;}
    @media (max-width: 780px) {
      .locale-row{grid-template-columns:1fr;}
      .locale-key{padding-top:0;}
      .locale-values{grid-template-columns:1fr;}
      .gallery-item-card{grid-template-columns:1fr;}
    }
  </style>
</head>
<body>

<header class="hdr">
  <div class="hdr-inner">
    <span class="hdr-logo">⚙ OrionPnP <span class="badge">CMS</span></span>
    <div class="hdr-right">
      <span class="save-status" id="saveStatus"></span>
      <button class="btn btn-sm" id="importBtn" type="button">Import content.json</button>
      <input id="importFile" type="file" accept="application/json,.json" style="display:none">
      <button class="btn btn-sm" id="logoutBtn" type="button" style="display:none">Logout</button>
      <button class="btn btn-primary" id="saveBtn" disabled>Save Changes</button>
    </div>
  </div>
</header>

<div class="auth-overlay show" id="authOverlay" aria-live="polite">
  <div class="auth-card">
    <h2>Admin access</h2>
    <p id="authMessage">Sign in to unlock content, locales, and asset editing.</p>
    <form class="auth-form" id="loginForm">
      <label>
        Password
        <input id="authPassword" type="password" autocomplete="current-password" required>
      </label>
      <div class="auth-actions">
        <span class="auth-note" id="authStatus">Locked.</span>
        <button class="btn btn-primary" type="submit">Unlock editor</button>
      </div>
    </form>
  </div>
</div>

<nav class="tabs" id="tabs"></nav>
<main class="main" id="main"><p class="loading">Loading…</p></main>

<script>
/* ─────────────────────────────────────────────────────── state */
let content = null;
let locales = null;
let dirty   = false;
let activeTab = 'updates';
let sourceLocale = 'en';
let targetLocale = 'it';
let adminAuthenticated = false;
let adminConfigured = false;
const openCards = { updates: new Set(), timeline: new Set(), milestones: new Set(), planned_work: new Set() };

/* ─────────────────────────────────────────────────────── schema */
const TABS = [
  { key: 'updates',      label: 'Updates' },
  { key: 'timeline',     label: 'Timeline' },
  { key: 'milestones',   label: 'Milestones' },
  { key: 'planned_work', label: 'Planned Work' },
  { key: 'gallery',      label: 'Gallery' },
  { key: 'locales',      label: 'Locales' },
];

const SCHEMA = {
  updates: {
    summary: i => i.title?.en || '(untitled)',
    meta:    i => [i.date, i.status].filter(Boolean).join(' · '),
    fields: [
      { k:'date',   label:'Date',              type:'text',     half:true  },
      { k:'status', label:'Status',            type:'select',   half:true,  opts:['active','draft','archived'] },
      { k:'tags',   label:'Tags (comma-sep)',  type:'text',     half:false, toVal: v => (v||[]).join(', '), fromVal: v => v.split(',').map(s=>s.trim()).filter(Boolean) },
      { k:'title',  label:'Title',             type:'text',     half:false, ml:true },
      { k:'body',   label:'Body',              type:'textarea', half:false, ml:true },
    ],
    blank: () => ({ date: today(), status:'draft', tags:[], title:{en:'',it:'',fr:'',es:''}, body:{en:'',it:'',fr:'',es:''} }),
  },
  timeline: {
    summary: i => i.label?.en || '(untitled)',
    meta:    i => i.date || '',
    fields: [
      { k:'date',        label:'Date',        type:'text',     half:false },
      { k:'label',       label:'Label',       type:'text',     half:false, ml:true },
      { k:'description', label:'Description', type:'textarea', half:false, ml:true },
    ],
    blank: () => ({ date:'', label:{en:'',it:'',fr:'',es:''}, description:{en:'',it:'',fr:'',es:''} }),
  },
  milestones: {
    summary: i => i.name?.en || '(untitled)',
    meta:    i => [i.target, i.progress != null ? i.progress+'%' : ''].filter(Boolean).join(' · '),
    fields: [
      { k:'target',      label:'Target',      type:'text',     half:true  },
      { k:'progress',    label:'Progress %',  type:'number',   half:true  },
      { k:'name',        label:'Name',        type:'text',     half:false, ml:true },
      { k:'description', label:'Description', type:'textarea', half:false, ml:true },
    ],
    blank: () => ({ target:'', progress:0, name:{en:'',it:'',fr:'',es:''}, description:{en:'',it:'',fr:'',es:''} }),
  },
  planned_work: {
    summary: i => i.task?.en || i.window || '(untitled)',
    meta:    i => i.window || '',
    fields: [
      { k:'window',  label:'Window',  type:'text',     half:false },
      { k:'task',    label:'Task',    type:'text',     half:false, ml:true },
      { k:'details', label:'Details', type:'textarea', half:false, ml:true },
    ],
    blank: () => ({ window:'', task:{en:'',it:'',fr:'',es:''}, details:{en:'',it:'',fr:'',es:''} }),
  },
};

/* ─────────────────────────────────────────────────────── helpers */
function today() { return new Date().toISOString().slice(0,10); }
function esc(s)  { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function getVal(item, f, lang='en') {
  if (f.ml)      return item[f.k]?.[lang] ?? '';
  if (f.toVal)   return f.toVal(item[f.k]);
  return item[f.k] ?? '';
}

function setVal(item, f, raw, lang='en') {
  if (f.ml) {
    item[f.k] = item[f.k] || {en:'',it:'',fr:'',es:''};
    item[f.k][lang] = raw;
  } else if (f.fromVal) {
    item[f.k] = f.fromVal(raw);
  } else if (f.type === 'number') {
    item[f.k] = raw === '' ? 0 : Number(raw);
  } else {
    item[f.k] = raw;
  }
  markDirty();
}

/* ─────────────────────────────────────────────────────── dirty */
function markDirty() {
  dirty = true;
  const saveBtn = document.getElementById('saveBtn');
  saveBtn.disabled = !adminAuthenticated;
  setStatus('');
}

function setStatus(msg, cls='') {
  const el = document.getElementById('saveStatus');
  el.textContent = msg;
  el.className = 'save-status' + (cls ? ' '+cls : '');
}

function updateAuthUI() {
  const overlay = document.getElementById('authOverlay');
  const message = document.getElementById('authMessage');
  const authStatus = document.getElementById('authStatus');
  const logoutBtn = document.getElementById('logoutBtn');
  const importBtn = document.getElementById('importBtn');
  const saveBtn = document.getElementById('saveBtn');

  document.body.classList.toggle('locked', !adminAuthenticated);
  overlay.classList.toggle('show', !adminAuthenticated);
  logoutBtn.style.display = adminAuthenticated ? 'inline-flex' : 'none';
  importBtn.disabled = !adminAuthenticated;
  saveBtn.disabled = !adminAuthenticated || !dirty;

  if (adminConfigured) {
    message.textContent = 'Sign in to unlock content, locales, and asset editing.';
    authStatus.textContent = adminAuthenticated ? 'Unlocked.' : 'Locked.';
  } else {
    message.textContent = 'Admin password is not configured yet. Run the local setup script to create one.';
    authStatus.textContent = 'Configuration required.';
  }
}

async function loadAuthStatus() {
  try {
    const res = await fetch('/api/auth/status', { headers: { Accept: 'application/json' } });
    if (!res.ok) return;
    const data = await res.json();
    adminConfigured = Boolean(data.configured);
    adminAuthenticated = Boolean(data.authenticated);
  } catch {
    adminConfigured = false;
    adminAuthenticated = false;
  }
  updateAuthUI();
}

async function loginWithPassword(password) {
  const res = await fetch('/api/auth/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ password }),
  });
  let data = {};
  try { data = await res.json(); } catch {}
  if (!res.ok) throw new Error(data.error || 'Login failed');
  adminAuthenticated = true;
  updateAuthUI();
}

async function logoutAdmin() {
  await fetch('/api/auth/logout', { method: 'POST' });
  adminAuthenticated = false;
  updateAuthUI();
}

/* ─────────────────────────────────────────────────────── render */
function renderTabs() {
  const nav = document.getElementById('tabs');
  nav.innerHTML = TABS.map(t => {
    let count;
    if (t.key === 'locales') count = Object.keys((locales && locales.en) || {}).length;
    else if (t.key === 'gallery') count = (content && content.gallery ? content.gallery.length : 0);
    else count = (content && content[t.key] ? content[t.key].length : 0);
    return `<button class="tab${t.key===activeTab?' active':''}" data-tab="${t.key}">${t.label} <span style="opacity:.5;font-size:.78em">(${count})</span></button>`;
  }).join('');
  nav.querySelectorAll('.tab').forEach(btn =>
    btn.addEventListener('click', () => { activeTab = btn.dataset.tab; renderAll(); })
  );
}

function renderMain() {
  if (activeTab === 'locales') { renderLocalesPanel(); return; }
  if (activeTab === 'gallery') { renderGalleryPanel(); return; }

  const main = document.getElementById('main');
  const schema = SCHEMA[activeTab];
  const items  = content[activeTab] || [];

  let html = `<div class="panel">
    <div class="panel-header">
      <h2>${TABS.find(t=>t.key===activeTab).label}</h2>
      <span class="cnt">${items.length} item${items.length!==1?'s':''}</span>
    </div>
    <div class="items" id="itemList">`;

  items.forEach((item, idx) => {
    const open = openCards[activeTab].has(idx);
    html += renderCard(schema, item, idx, open);
  });

  html += `</div><button class="btn-add" id="btnAdd">+ Add entry</button></div>`;
  main.innerHTML = html;

  // card header toggles
  main.querySelectorAll('.card-hdr').forEach(hdr => {
    hdr.addEventListener('click', () => {
      const card = hdr.closest('.card');
      const idx  = Number(card.dataset.idx);
      if (openCards[activeTab].has(idx)) openCards[activeTab].delete(idx);
      else openCards[activeTab].add(idx);
      card.classList.toggle('open', openCards[activeTab].has(idx));
      hdr.querySelector('.chevron').style.transform = openCards[activeTab].has(idx) ? 'rotate(90deg)' : '';
    });
  });

  // field inputs
  main.querySelectorAll('[data-idx][data-fk]').forEach(el => {
    const sectionItems = content[activeTab];
    const onChange = () => {
      const idx  = Number(el.dataset.idx);
      const fk   = el.dataset.fk;
      const lang = el.dataset.lang || null;
      const f    = schema.fields.find(x => x.k === fk);
      if (!f) return;
      if (lang) setVal(sectionItems[idx], f, el.value, lang);
      else      setVal(sectionItems[idx], f, el.value);
      // update summary in header without full re-render
      const hdrSum = el.closest('.card')?.querySelector('.card-summary');
      if (hdrSum) hdrSum.textContent = schema.summary(sectionItems[idx]);
      const hdrMeta = el.closest('.card')?.querySelector('.card-meta');
      if (hdrMeta) hdrMeta.textContent = schema.meta(sectionItems[idx]);
    };
    el.addEventListener('input', onChange);
    el.addEventListener('change', onChange);
  });

  // lang toggles
  main.querySelectorAll('.lang-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const lf = btn.nextElementSibling;
      const open = lf.classList.toggle('open');
      btn.querySelector('.chevron').style.transform = open ? 'rotate(90deg)' : '';
    });
  });

  // move up/down
  main.querySelectorAll('[data-move]').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const card  = btn.closest('.card');
      const idx   = Number(card.dataset.idx);
      const dir   = btn.dataset.move;
      const arr   = content[activeTab];
      if (dir === 'up'   && idx > 0)           { [arr[idx-1],arr[idx]] = [arr[idx],arr[idx-1]]; markDirty(); renderAll(); }
      if (dir === 'down' && idx < arr.length-1) { [arr[idx],arr[idx+1]] = [arr[idx+1],arr[idx]]; markDirty(); renderAll(); }
    });
  });

  // delete
  main.querySelectorAll('[data-delete]').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const idx = Number(btn.closest('.card').dataset.idx);
      if (!confirm('Delete this entry?')) return;
      content[activeTab].splice(idx, 1);
      openCards[activeTab].clear();
      markDirty();
      renderAll();
    });
  });

  // add new
  document.getElementById('btnAdd').addEventListener('click', () => {
    const arr = content[activeTab];
    arr.unshift(schema.blank());
    openCards[activeTab].clear();
    openCards[activeTab].add(0);
    markDirty();
    renderAll();
    document.getElementById('main').scrollIntoView({behavior:'smooth'});
  });
}

/* ─────────────────────────────────────────────────────── gallery panel */
let assetList = [];   // [{name, url, size}] loaded from /api/assets

async function refreshAssets() {
  try {
    const res = await fetch('/api/assets', {headers:{Accept:'application/json'}});
    assetList = res.ok ? await res.json() : [];
  } catch { assetList = []; }
}

function galleryLang(item, field, lang) {
  item[field] = item[field] || {en:'',it:'',fr:'',es:''};
  return item[field][lang] || '';
}

function renderGalleryPanel() {
  const main = document.getElementById('main');
  const galleryItems = content.gallery || [];

  // asset browser tiles
  const tiles = assetList.map((a) => `
    <div class="asset-tile">
      <img src="${esc(a.url)}" alt="${esc(a.name)}">
      <div class="asset-tile-foot">
        <div class="asset-tile-name" title="${esc(a.name)}">${esc(a.name)}</div>
        <div class="asset-tile-btns">
          <button class="btn-add-gallery" data-add-asset="${esc(a.url)}">+ Gallery</button>
          <button class="btn-sm btn-del" data-del-asset="${esc(a.name)}" ${a.deletable ? '' : 'disabled title="Tracked asset"'}>✕</button>
        </div>
      </div>
    </div>`).join('');

  // gallery items list
  const itemRows = galleryItems.map((item, idx) => {
    const srcOpts = assetList.map(a =>
      `<option value="${esc(a.url)}"${item.src===a.url?' selected':''}>${esc(a.name)}</option>`
    ).join('');
    // also add current src even if not in asset list
    const srcInList = assetList.some(a => a.url === item.src);
    const extraOpt = (!srcInList && item.src) ? `<option value="${esc(item.src)}" selected>${esc(item.src)}</option>` : '';
    return `
    <div class="gallery-item-card" data-gidx="${idx}">
      <img class="gallery-item-thumb" src="${esc(item.src||'')}" alt="">
      <div class="gallery-item-fields">
        <div class="field">
          <label>Image</label>
          <select data-gfield="src" data-gidx="${idx}">${extraOpt}${srcOpts}</select>
        </div>
        <div class="fgrid">
          <div class="field">
            <label>Alt / Tooltip (EN)</label>
            <input type="text" data-gfield="alt" data-glang="en" data-gidx="${idx}" value="${esc(galleryLang(item,'alt','en'))}">
          </div>
          <div class="field">
            <label>Caption (EN)</label>
            <input type="text" data-gfield="caption" data-glang="en" data-gidx="${idx}" value="${esc(galleryLang(item,'caption','en'))}">
          </div>
        </div>
        <details style="margin-top:.2rem">
          <summary style="font-size:.75rem;color:var(--muted);cursor:pointer">IT / FR / ES</summary>
          <div class="fgrid tri" style="margin-top:.5rem">
            <div class="field"><label>Alt IT</label><input type="text" data-gfield="alt" data-glang="it" data-gidx="${idx}" value="${esc(galleryLang(item,'alt','it'))}"></div>
            <div class="field"><label>Alt FR</label><input type="text" data-gfield="alt" data-glang="fr" data-gidx="${idx}" value="${esc(galleryLang(item,'alt','fr'))}"></div>
            <div class="field"><label>Alt ES</label><input type="text" data-gfield="alt" data-glang="es" data-gidx="${idx}" value="${esc(galleryLang(item,'alt','es'))}"></div>
            <div class="field"><label>Caption IT</label><input type="text" data-gfield="caption" data-glang="it" data-gidx="${idx}" value="${esc(galleryLang(item,'caption','it'))}"></div>
            <div class="field"><label>Caption FR</label><input type="text" data-gfield="caption" data-glang="fr" data-gidx="${idx}" value="${esc(galleryLang(item,'caption','fr'))}"></div>
            <div class="field"><label>Caption ES</label><input type="text" data-gfield="caption" data-glang="es" data-gidx="${idx}" value="${esc(galleryLang(item,'caption','es'))}"></div>
          </div>
        </details>
      </div>
      <div class="gallery-item-actions">
        <button class="btn-sm" data-gmove="up" data-gidx="${idx}">↑</button>
        <button class="btn-sm" data-gmove="down" data-gidx="${idx}">↓</button>
        <button class="btn-sm btn-del" data-gdel="${idx}">Delete</button>
      </div>
    </div>`;
  }).join('');

  main.innerHTML = `<div class="panel">
    <div class="asset-browser">
      <div class="asset-browser-hdr">
        <h3>Assets (${assetList.length} images)</h3>
        <button class="btn btn-sm" id="uploadBtn">Upload image</button>
        <input id="uploadFile" type="file" accept="image/*" style="display:none" multiple>
      </div>
      <div class="upload-zone" id="uploadZone">Drop images here or click Upload</div>
      <div class="asset-grid" id="assetGrid">${tiles || '<p class="empty">No images in assets/ folder</p>'}</div>
    </div>
    <div>
      <div class="gallery-items-hdr">
        <h3>Gallery items (${galleryItems.length})</h3>
        <span style="font-size:.78rem;color:var(--muted)">These appear on the Gallery page in order.</span>
      </div>
      <div id="galleryItemList">${itemRows || '<p class="empty">No gallery items. Use + Gallery to add images.</p>'}</div>
    </div>
  </div>`;

  // upload button
  document.getElementById('uploadBtn').addEventListener('click', () => document.getElementById('uploadFile').click());
  document.getElementById('uploadFile').addEventListener('change', async (e) => {
    const files = [...(e.target.files||[])];
    e.target.value = '';
    for (const file of files) await uploadAssetFile(file);
    await refreshAssets();
    renderAll();
  });

  // drag-drop upload
  const zone = document.getElementById('uploadZone');
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('drag'));
  zone.addEventListener('drop', async e => {
    e.preventDefault();
    zone.classList.remove('drag');
    const files = [...(e.dataTransfer.files||[])].filter(f => f.type.startsWith('image/'));
    for (const file of files) await uploadAssetFile(file);
    await refreshAssets();
    renderAll();
  });

  // add to gallery
  main.querySelectorAll('[data-add-asset]').forEach(btn => {
    btn.addEventListener('click', () => {
      if (!adminAuthenticated) { setStatus('Login required', 'err'); return; }
      const src = btn.dataset.addAsset;
      content.gallery = content.gallery || [];
      content.gallery.push({ src, alt:{en:'',it:'',fr:'',es:''}, caption:{en:'',it:'',fr:'',es:''} });
      markDirty();
      renderAll();
    });
  });

  // delete asset
  main.querySelectorAll('[data-del-asset]').forEach(btn => {
    btn.addEventListener('click', async () => {
      if (!adminAuthenticated) { setStatus('Login required', 'err'); return; }
      const name = btn.dataset.delAsset;
      if (!confirm(`Delete asset "${name}"?\nThis cannot be undone.`)) return;
      try {
        const res = await fetch(`/api/assets/${encodeURIComponent(name)}`, {method:'DELETE'});
        if (!res.ok) {
          const data = await res.json().catch(() => ({}));
          setStatus(data.error || 'Delete failed','err');
          return;
        }
        await refreshAssets();
        renderAll();
      } catch { setStatus('Delete failed','err'); }
    });
  });

  // gallery field edits
  main.querySelectorAll('[data-gfield]').forEach(el => {
    el.addEventListener('input', () => applyGalleryField(el));
    el.addEventListener('change', () => {
      applyGalleryField(el);
      // update thumb if src changed
      if (el.dataset.gfield === 'src') {
        const card = el.closest('.gallery-item-card');
        if (card) card.querySelector('.gallery-item-thumb').src = el.value;
      }
    });
  });

  // gallery reorder
  main.querySelectorAll('[data-gmove]').forEach(btn => {
    btn.addEventListener('click', () => {
      const idx = Number(btn.dataset.gidx);
      const dir = btn.dataset.gmove;
      const arr = content.gallery;
      if (dir==='up'   && idx>0)          { [arr[idx-1],arr[idx]]=[arr[idx],arr[idx-1]]; markDirty(); renderAll(); }
      if (dir==='down' && idx<arr.length-1){ [arr[idx],arr[idx+1]]=[arr[idx+1],arr[idx]]; markDirty(); renderAll(); }
    });
  });

  // gallery delete
  main.querySelectorAll('[data-gdel]').forEach(btn => {
    btn.addEventListener('click', () => {
      if (!confirm('Remove from gallery?')) return;
      content.gallery.splice(Number(btn.dataset.gdel), 1);
      markDirty();
      renderAll();
    });
  });
}

function applyGalleryField(el) {
  const idx  = Number(el.dataset.gidx);
  const field = el.dataset.gfield;
  const lang  = el.dataset.glang || null;
  const item  = content.gallery[idx];
  if (!item) return;
  if (lang) {
    item[field] = item[field] || {en:'',it:'',fr:'',es:''};
    item[field][lang] = el.value;
  } else {
    item[field] = el.value;
  }
  markDirty();
}

async function uploadAssetFile(file) {
  if (!adminAuthenticated) { setStatus('Login required', 'err'); return; }
  const fd = new FormData();
  fd.append('file', file);
  try {
    const res = await fetch('/api/assets/upload', {method:'POST', body:fd});
    const data = await res.json();
    if (!res.ok) { setStatus(data.error || 'Upload failed','err'); return; }
    setStatus(`Uploaded ${data.name} ✓`, 'ok');
    setTimeout(() => setStatus(''), 3000);
  } catch { setStatus('Upload failed','err'); }
}

function renderLocalesPanel() {
  const main = document.getElementById('main');
  const keySet = new Set();
  ['en', 'it', 'fr', 'es'].forEach((lang) => {
    Object.keys((locales && locales[lang]) || {}).forEach((k) => keySet.add(k));
  });
  const allKeys = [...keySet].sort();

  const rows = allKeys.map((key) => {
    const sourceVal = (locales[sourceLocale] && locales[sourceLocale][key]) || '';
    const targetVal = (locales[targetLocale] && locales[targetLocale][key]) || '';
    return `<div class="locale-row">
      <div class="locale-key">${esc(key)}</div>
      <div class="locale-values">
        <div class="locale-col">
          <label>${sourceLocale.toUpperCase()} (Reference)</label>
          <textarea class="ref" readonly tabindex="-1">${esc(sourceVal)}</textarea>
        </div>
        <div class="locale-col">
          <label>${targetLocale.toUpperCase()} (Translation)</label>
          <textarea data-locale-target-key="${esc(key)}">${esc(targetVal)}</textarea>
        </div>
      </div>
    </div>`;
  }).join('');

  main.innerHTML = `<div class="panel">
    <div class="panel-header">
      <h2>Locales</h2>
      <span class="cnt">${allKeys.length} keys</span>
    </div>
    <div class="locale-toolbar">
      <label for="localeSourceSelect">Reference</label>
      <select id="localeSourceSelect">
        <option value="en" ${sourceLocale==='en'?'selected':''}>EN</option>
        <option value="it" ${sourceLocale==='it'?'selected':''}>IT</option>
        <option value="fr" ${sourceLocale==='fr'?'selected':''}>FR</option>
        <option value="es" ${sourceLocale==='es'?'selected':''}>ES</option>
      </select>
      <label for="localeTargetSelect">Translate To</label>
      <select id="localeTargetSelect">
        <option value="en" ${targetLocale==='en'?'selected':''}>EN</option>
        <option value="it" ${targetLocale==='it'?'selected':''}>IT</option>
        <option value="fr" ${targetLocale==='fr'?'selected':''}>FR</option>
        <option value="es" ${targetLocale==='es'?'selected':''}>ES</option>
      </select>
    </div>
    <div class="locale-grid">${rows || '<p class="empty">No locale keys found</p>'}</div>
  </div>`;

  document.getElementById('localeSourceSelect').addEventListener('change', (e) => {
    sourceLocale = e.target.value;
    renderAll();
  });

  document.getElementById('localeTargetSelect').addEventListener('change', (e) => {
    targetLocale = e.target.value;
    renderAll();
  });

  main.querySelectorAll('[data-locale-target-key]').forEach((el) => {
    const onChange = () => {
      const key = el.dataset.localeTargetKey;
      locales[targetLocale] = locales[targetLocale] || {};
      locales[targetLocale][key] = el.value;
      markDirty();
    };
    el.addEventListener('input', onChange);
    el.addEventListener('change', onChange);
  });
}

function renderCard(schema, item, idx, open) {
  const o = open ? ' open' : '';
  return `
  <div class="card${o}" data-idx="${idx}">
    <div class="card-hdr">
      <span class="chevron" style="${open?'transform:rotate(90deg)':''}">&#9654;</span>
      <span class="card-summary">${esc(schema.summary(item))}</span>
      <span class="card-meta">${esc(schema.meta(item))}</span>
    </div>
    <div class="card-body">
      ${renderFields(schema, item, idx)}
      <div class="card-foot">
        <div class="card-order">
          <button class="btn-sm" data-move="up" title="Move up">↑</button>
          <button class="btn-sm" data-move="down" title="Move down">↓</button>
        </div>
        <button class="btn-sm btn-del" data-delete="1">Delete</button>
      </div>
    </div>
  </div>`;
}

function renderFields(schema, item, idx) {
  let html = '';
  // group non-ml fields into a grid, ml fields full-width
  const simpleFields = schema.fields.filter(f => !f.ml);
  const mlFields     = schema.fields.filter(f => f.ml);

  if (simpleFields.length) {
    const cols = simpleFields.length === 1 ? 'full' : simpleFields.some(f=>!f.half) ? 'full' : '';
    // render each simply
    let gridHtml = '';
    let inGrid = false;
    simpleFields.forEach(f => {
      if (f.half && !inGrid) { gridHtml += '<div class="fgrid">'; inGrid = true; }
      if (!f.half && inGrid) { gridHtml += '</div>'; inGrid = false; }
      if (!f.half) gridHtml += '<div class="fgrid full">';
      gridHtml += renderField(f, getVal(item, f), idx, null);
      if (!f.half) gridHtml += '</div>';
    });
    if (inGrid) gridHtml += '</div>';
    html += gridHtml;
  }

  mlFields.forEach(f => {
    const enVal  = getVal(item, f, 'en');
    const itVal  = getVal(item, f, 'it');
    const frVal  = getVal(item, f, 'fr');
    const esVal  = getVal(item, f, 'es');
    html += `<div class="fgrid full">${renderField(f, enVal, idx, 'en')}</div>`;
    html += `<div class="lang-hdr">
      <button class="lang-btn" type="button"><span class="chevron">&#9654;</span> IT / FR / ES</button>
      <div class="lang-fields">
        <div class="field"><label>IT</label>${renderInput(f, itVal, idx, 'it')}</div>
        <div class="field"><label>FR</label>${renderInput(f, frVal, idx, 'fr')}</div>
        <div class="field"><label>ES</label>${renderInput(f, esVal, idx, 'es')}</div>
      </div>
    </div>`;
  });

  return html;
}

function renderField(f, val, idx, lang) {
  return `<div class="field"><label>${esc(f.label)}${lang?' ('+lang.toUpperCase()+')':''}</label>${renderInput(f, val, idx, lang)}</div>`;
}

function renderInput(f, val, idx, lang) {
  const attrs = `data-idx="${idx}" data-fk="${f.k}"${lang?` data-lang="${lang}"`:''} `;
  const v = esc(val);
  if (f.type === 'select')   return `<select ${attrs}>${f.opts.map(o=>`<option${o===val?' selected':''}>${esc(o)}</option>`).join('')}</select>`;
  if (f.type === 'textarea') return `<textarea ${attrs} rows="3">${v}</textarea>`;
  if (f.type === 'number')   return `<input type="number" ${attrs} value="${v}" min="0" max="100">`;
  return `<input type="text" ${attrs} value="${v}">`;
}

function renderAll() {
  renderTabs();
  renderMain();
}

function normalizeImportedContent(data) {
  if (!data || typeof data !== 'object') throw new Error('Invalid JSON object');
  const normalized = {
    updates: Array.isArray(data.updates) ? data.updates : [],
    timeline: Array.isArray(data.timeline) ? data.timeline : [],
    milestones: Array.isArray(data.milestones) ? data.milestones : [],
    planned_work: Array.isArray(data.planned_work) ? data.planned_work : []
  };
  return normalized;
}

function setupImport() {
  const importBtn = document.getElementById('importBtn');
  const importFile = document.getElementById('importFile');
  if (!importBtn || !importFile) return;

  importBtn.addEventListener('click', () => {
    if (!adminAuthenticated) {
      setStatus('Login required', 'err');
      updateAuthUI();
      return;
    }
    importFile.click();
  });

  importFile.addEventListener('change', async () => {
    const file = importFile.files && importFile.files[0];
    if (!file) return;

    try {
      const text = await file.text();
      const parsed = JSON.parse(text);
      const next = normalizeImportedContent(parsed);

      if (dirty && !confirm('You have unsaved changes. Replace editor content with imported file?')) {
        importFile.value = '';
        return;
      }

      content = next;
      openCards.updates.clear();
      openCards.timeline.clear();
      openCards.milestones.clear();
      openCards.planned_work.clear();
      markDirty();
      renderAll();
      setStatus('Imported content.json. Click Save Changes to apply.', 'ok');
    } catch {
      setStatus('Import failed: invalid JSON file', 'err');
    } finally {
      importFile.value = '';
    }
  });
}

/* ─────────────────────────────────────────────────────── load / save */
async function load() {
  try {
    const [contentRes, localesRes, authRes] = await Promise.all([
      fetch('/api/content', {headers:{Accept:'application/json'}}),
      fetch('/api/locales', {headers:{Accept:'application/json'}}),
      fetch('/api/auth/status', {headers:{Accept:'application/json'}}),
    ]);
    if (!contentRes.ok || !localesRes.ok || !authRes.ok) throw new Error();

    content = await contentRes.json();
    locales = await localesRes.json();
    const auth = await authRes.json();
    adminConfigured = Boolean(auth.configured);
    adminAuthenticated = Boolean(auth.authenticated);

    content.updates      = content.updates      || [];
    content.timeline     = content.timeline     || [];
    content.milestones   = content.milestones   || [];
    content.planned_work = content.planned_work || [];
    content.gallery      = content.gallery      || [];

    locales = locales && typeof locales === 'object' ? locales : {};
    ['en', 'it', 'fr', 'es'].forEach((lang) => {
      if (!locales[lang] || typeof locales[lang] !== 'object') locales[lang] = {};
    });

    await refreshAssets();
    updateAuthUI();
    renderAll();
  } catch {
    document.getElementById('main').innerHTML = '<p class="loading" style="color:var(--danger)">Failed to load content/locales</p>';
  }
}

async function save() {
  if (!adminAuthenticated) {
    setStatus('Login required', 'err');
    updateAuthUI();
    return;
  }
  const btn = document.getElementById('saveBtn');
  btn.disabled = true;
  setStatus('Saving…');
  try {
    const contentRes = await fetch('/api/content', {
      method:  'PUT',
      headers: {'Content-Type':'application/json'},
      body:    JSON.stringify(content),
    });

    if (!contentRes.ok) throw new Error();

    const localesRes = await fetch('/api/locales', {
      method:  'PUT',
      headers: {'Content-Type':'application/json'},
      body:    JSON.stringify(locales),
    });

    if (!localesRes.ok) throw new Error();

    dirty = false;
    setStatus('Saved ✓', 'ok');
    renderTabs(); // refresh counts
    setTimeout(() => setStatus(''), 3000);
  } catch {
    setStatus('Save failed', 'err');
    btn.disabled = false;
  }
}

document.getElementById('saveBtn').addEventListener('click', save);
document.getElementById('logoutBtn').addEventListener('click', logoutAdmin);
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const passwordInput = document.getElementById('authPassword');
  const authStatus = document.getElementById('authStatus');
  authStatus.textContent = 'Checking password…';
  try {
    await loginWithPassword(passwordInput.value);
    passwordInput.value = '';
    authStatus.textContent = 'Unlocked.';
    setStatus('Logged in', 'ok');
    await refreshAssets();
    renderAll();
  } catch (err) {
    authStatus.textContent = err.message || 'Login failed';
    setStatus(err.message || 'Login failed', 'err');
    passwordInput.focus();
    passwordInput.select();
  }
});
setupImport();
updateAuthUI();

window.addEventListener('beforeunload', e => {
  if (dirty) { e.preventDefault(); e.returnValue = ''; }
});

load();
</script>
